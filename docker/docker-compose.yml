# Proof of Concept: Infrastructure setup for Metabase and PostgreSQL
version: '3.9'

services:
  postgres_dw:
    image: postgres:15
    container_name: data_warehouse
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_here
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    container_name: metabase_bi
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: analytics_db
      MB_DB_PORT: 5432
      MB_DB_USER: admin
      MB_DB_PASS: secure_password_here
      MB_DB_HOST: postgres_dw
    depends_on:
      - postgres_dw

volumes:
  postgres_data: